# Based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py314"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203",   # no-blank-line-before-class (incompatible with formatter)
    "D212",   # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter

    # Pragmatic ignores for HA custom integration patterns:
    "D107",   # Missing docstring in __init__ (HA entities use simple __init__)
    "TC001",  # Move application import into TYPE_CHECKING block
    "TC002",  # Move third-party import into TYPE_CHECKING block (HA pattern)
    "TRY003", # Long messages outside exception class
    "EM102",  # Exception must not use f-string literal
    "FBT003", # Boolean positional value in function call
    "S105",   # Possible hardcoded password (false positive on config key names)
    "ARG002", # Unused method argument (HA entity method signatures are fixed)
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",    # assert is fine in tests
    "S106",    # hardcoded passwords in test fixtures are fine
    "ARG001",  # unused fixtures are injected by pytest
    "ARG005",  # unused lambda args in test helpers
    "ANN",     # type annotations not required in tests
    "D",       # docstring rules relaxed in tests
    "SLF001",  # private member access is standard for testing internals
    "PLR2004", # magic values in assertions are fine in tests
    "PLC0415", # local imports sometimes needed in tests
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
